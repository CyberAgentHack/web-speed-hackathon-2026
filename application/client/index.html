<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaX</title>
    <style>body{background:#f5f5f4;color:#042f2e;margin:0}</style>
  </head>
  <body class="bg-cax-canvas text-cax-text">
    <div id="app">
      <div style="position:relative;z-index:0;display:flex;justify-content:center;font-family:system-ui,sans-serif">
        <div style="display:flex;min-height:100vh;max-width:100%;background:#fff">
          <aside style="position:relative;z-index:10" class="skeleton-aside">
            <nav style="border-right:1px solid #e5e5e4;width:192px;height:100%;padding:8px">
              <div style="display:flex;flex-direction:column;gap:4px;padding-top:16px">
                <div style="height:40px;border-radius:9999px;background:#f0efed"></div>
                <div style="height:40px;border-radius:9999px;background:#f0efed"></div>
                <div style="height:40px;border-radius:9999px;background:#f0efed"></div>
                <div style="height:40px;border-radius:9999px;background:#f0efed"></div>
                <div style="height:40px;border-radius:9999px;background:#f0efed"></div>
              </div>
            </nav>
          </aside>
          <main style="width:100vw;max-width:640px;min-width:0;flex-shrink:1;padding-bottom:48px">
            <div style="padding:4px 16px"><div style="display:flex;border-bottom:1px solid #e5e5e4;padding:8px 0 16px">
              <div style="flex-shrink:0;padding-right:8px"><div style="width:48px;height:48px;border-radius:9999px;background:#f0efed"></div></div>
              <div style="flex-grow:1;min-width:0"><div style="height:14px;width:50%;border-radius:4px;background:#f0efed;margin-bottom:10px"></div><div style="height:14px;width:90%;border-radius:4px;background:#f0efed;margin-bottom:6px"></div><div style="height:14px;width:70%;border-radius:4px;background:#f0efed"></div></div>
            </div></div>
            <div style="padding:4px 16px"><div style="display:flex;border-bottom:1px solid #e5e5e4;padding:8px 0 16px">
              <div style="flex-shrink:0;padding-right:8px"><div style="width:48px;height:48px;border-radius:9999px;background:#f0efed"></div></div>
              <div style="flex-grow:1;min-width:0"><div style="height:14px;width:40%;border-radius:4px;background:#f0efed;margin-bottom:10px"></div><div style="height:14px;width:80%;border-radius:4px;background:#f0efed;margin-bottom:6px"></div><div style="height:14px;width:60%;border-radius:4px;background:#f0efed"></div></div>
            </div></div>
            <div style="padding:4px 16px"><div style="display:flex;border-bottom:1px solid #e5e5e4;padding:8px 0 16px">
              <div style="flex-shrink:0;padding-right:8px"><div style="width:48px;height:48px;border-radius:9999px;background:#f0efed"></div></div>
              <div style="flex-grow:1;min-width:0"><div style="height:14px;width:55%;border-radius:4px;background:#f0efed;margin-bottom:10px"></div><div style="height:14px;width:85%;border-radius:4px;background:#f0efed;margin-bottom:6px"></div><div style="height:14px;width:50%;border-radius:4px;background:#f0efed"></div></div>
            </div></div>
            <div style="padding:4px 16px"><div style="display:flex;border-bottom:1px solid #e5e5e4;padding:8px 0 16px">
              <div style="flex-shrink:0;padding-right:8px"><div style="width:48px;height:48px;border-radius:9999px;background:#f0efed"></div></div>
              <div style="flex-grow:1;min-width:0"><div style="height:14px;width:45%;border-radius:4px;background:#f0efed;margin-bottom:10px"></div><div style="height:14px;width:75%;border-radius:4px;background:#f0efed;margin-bottom:6px"></div><div style="height:14px;width:65%;border-radius:4px;background:#f0efed"></div></div>
            </div></div>
          </main>
        </div>
      </div>
      <div class="skeleton-bottomnav" style="position:fixed;right:0;bottom:0;left:0;z-index:10;height:48px;border-top:1px solid #e5e5e4;background:#fff;display:flex;align-items:center;justify-content:space-around;padding:0 8px">
        <div style="width:40px;height:40px;border-radius:9999px;background:#f0efed"></div>
        <div style="width:40px;height:40px;border-radius:9999px;background:#f0efed"></div>
        <div style="width:40px;height:40px;border-radius:9999px;background:#f0efed"></div>
        <div style="width:40px;height:40px;border-radius:9999px;background:#f0efed"></div>
      </div>
      <style>
        .skeleton-aside{display:none}
        .skeleton-bottomnav{display:flex}
        @media(min-width:1024px){
          .skeleton-aside{display:block!important}
          .skeleton-bottomnav{display:none!important}
        }
      </style>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
