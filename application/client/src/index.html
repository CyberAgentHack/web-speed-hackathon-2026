<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaX</title>
    <link rel="preload" as="image" href="/images/029b4b75-bbcc-4aa5-8bd7-e4bb12a33cd3.thumb.avif" type="image/avif" fetchpriority="high" />
    <script>
      window.__PREFETCH_JSON__ = window.__PREFETCH_JSON__ || {};
      window.__HOME_TIMELINE_PREFETCH__ = window.__HOME_TIMELINE_PREFETCH__ || null;
      (function () {
        function preloadImage(href) {
          if (!href) {
            return;
          }
          if (document.head.querySelector('link[rel="preload"][href="' + href + '"]')) {
            return;
          }
          var link = document.createElement("link");
          link.rel = "preload";
          link.as = "image";
          link.href = href;
          link.fetchPriority = "high";
          document.head.appendChild(link);
        }

        function readJsonOrText(response) {
          return response.text().then(function (text) {
            if (text === "") {
              return null;
            }
            try {
              return JSON.parse(text);
            } catch (_error) {
              return text;
            }
          });
        }

        var p = window.location.pathname;
        if (p === "/") {
          if (Array.isArray(window.__HOME_TIMELINE_PREFETCH__)) {
            window.__PREFETCH_TIMELINE__ = Promise.resolve(window.__HOME_TIMELINE_PREFETCH__);
            return;
          }
          if (window.__PREFETCH_TIMELINE__) {
            return;
          }
          window.__PREFETCH_TIMELINE__ = fetch("/api/v1/posts?limit=8&offset=0", {
            credentials: "same-origin",
            headers: { Accept: "application/json" },
          })
            .then(function (r) {
              if (!r.ok) {
                return readJsonOrText(r).then(function (body) {
                  console.error("[debug][timeline prefetch] request failed", {
                    body: body,
                    status: r.status,
                    statusText: r.statusText,
                  });
                  throw new Error("Failed to prefetch timeline");
                });
              }
              return r.json();
            })
            .then(function (posts) {
              window.__HOME_TIMELINE_PREFETCH__ = posts;
              return posts;
            });
          return;
        }

        var m = p.match(/^\/posts\/([^/?#]+)/);
        if (!m) {
          return;
        }

        var postId = m[1];
        var apiPath = "/api/v1/posts/" + postId;
        if (window.__PREFETCH_JSON__[apiPath] !== undefined) {
          return;
        }

        window.__PREFETCH_JSON__[apiPath] = fetch(apiPath, {
          credentials: "same-origin",
          headers: { Accept: "application/json" },
        })
          .then(function (r) {
            if (!r.ok) {
              return readJsonOrText(r).then(function (body) {
                console.error("[debug][post prefetch] request failed", {
                  apiPath: apiPath,
                  body: body,
                  status: r.status,
                  statusText: r.statusText,
                });
                throw new Error("Failed to prefetch post detail");
              });
            }
            return r.json();
          })
          .then(function (post) {
            var firstImage = post && post.images && post.images[0];
            if (firstImage && firstImage.id) {
              preloadImage("/images/" + firstImage.id + ".thumb.webp");
            }
            return post;
          });
      })();
    </script>
    <script defer src="/scripts/vendor.js"></script>
    <script defer src="/scripts/main.js"></script>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>

            <nav class="border-cax-border bg-cax-surface fixed right-0 bottom-0 left-0 z-10 h-12 border-t lg:relative lg:h-full lg:w-48 lg:border-t-0 lg:border-r"></nav>
          </aside>
          <main class="relative z-0 w-screen max-w-screen-sm min-w-0 shrink pb-12 lg:pb-0 min-h-screen"><div aria-hidden="true" id="skeleton"><style>#skeleton .sk{opacity:.25;animation:skp 1.5s ease-in-out infinite}@keyframes skp{50%{opacity:.1}}</style><div class="px-1 sm:px-4"><div class="border-cax-border flex border-b px-2 pt-2 pb-4 sm:px-4"><div class="shrink-0 pr-2 sm:pr-4"><div class="sk bg-cax-surface-subtle h-12 w-12 rounded-full sm:h-16 sm:w-16"></div></div><div class="min-w-0 grow space-y-2 pt-1"><div class="sk bg-cax-surface-subtle h-3 w-2/5 rounded"></div><div class="sk bg-cax-surface-subtle h-3 w-4/5 rounded"></div><div class="sk bg-cax-surface-subtle h-3 w-3/5 rounded"></div></div></div></div><div class="px-1 sm:px-4"><div class="border-cax-border flex border-b px-2 pt-2 pb-4 sm:px-4"><div class="shrink-0 pr-2 sm:pr-4"><div class="sk bg-cax-surface-subtle h-12 w-12 rounded-full sm:h-16 sm:w-16"></div></div><div class="min-w-0 grow space-y-2 pt-1"><div class="sk bg-cax-surface-subtle h-3 w-1/3 rounded"></div><div class="sk bg-cax-surface-subtle h-3 w-3/5 rounded"></div><div class="sk bg-cax-surface-subtle h-3 w-2/5 rounded"></div></div></div></div><div class="px-1 sm:px-4"><div class="border-cax-border flex border-b px-2 pt-2 pb-4 sm:px-4"><div class="shrink-0 pr-2 sm:pr-4"><div class="sk bg-cax-surface-subtle h-12 w-12 rounded-full sm:h-16 sm:w-16"></div></div><div class="min-w-0 grow space-y-2 pt-1"><div class="sk bg-cax-surface-subtle h-3 w-2/5 rounded"></div><div class="sk bg-cax-surface-subtle h-3 w-4/5 rounded"></div><div class="sk bg-cax-surface-subtle h-3 w-1/2 rounded"></div></div></div></div><div class="px-1 sm:px-4"><div class="border-cax-border flex border-b px-2 pt-2 pb-4 sm:px-4"><div class="shrink-0 pr-2 sm:pr-4"><div class="sk bg-cax-surface-subtle h-12 w-12 rounded-full sm:h-16 sm:w-16"></div></div><div class="min-w-0 grow space-y-2 pt-1"><div class="sk bg-cax-surface-subtle h-3 w-1/4 rounded"></div><div class="sk bg-cax-surface-subtle h-3 w-3/4 rounded"></div><div class="sk bg-cax-surface-subtle h-3 w-2/5 rounded"></div></div></div></div><div class="px-1 sm:px-4"><div class="border-cax-border flex border-b px-2 pt-2 pb-4 sm:px-4"><div class="shrink-0 pr-2 sm:pr-4"><div class="sk bg-cax-surface-subtle h-12 w-12 rounded-full sm:h-16 sm:w-16"></div></div><div class="min-w-0 grow space-y-2 pt-1"><div class="sk bg-cax-surface-subtle h-3 w-2/5 rounded"></div><div class="sk bg-cax-surface-subtle h-3 w-3/5 rounded"></div><div class="sk bg-cax-surface-subtle h-3 w-1/3 rounded"></div></div></div></div></div></main>
        </div>
      </div>
    </div>
  </body>
</html>
