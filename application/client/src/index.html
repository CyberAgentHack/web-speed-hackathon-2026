<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaX</title>
    <style>
      #app-loading {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 48px;
        background: #ffffff;
        border-top: 1px solid #e5e7eb;
        z-index: 10;
      }
      @media (prefers-color-scheme: dark) {
        #app-loading { background: #1a1a1a; border-top-color: #333; }
      }
      @media (min-width: 1024px) {
        #app-loading {
          top: 0;
          bottom: 0;
          left: 0;
          right: auto;
          width: 192px;
          height: 100%;
          border-top: none;
          border-right: 1px solid #e5e7eb;
        }
      }
    </style>
    <script type="module" src="/index.tsx"></script>
  </head>
  <body class="bg-cax-canvas text-cax-text">
    <!-- Navigation skeleton - painted immediately before JS loads, replaced by React -->
    <div id="app-loading" aria-hidden="true"></div>
    <div id="app"></div>
  </body>
</html>
