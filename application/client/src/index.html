<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaX</title>
    <% for (const tag of htmlWebpackPlugin.tags.headTags) { %>
    <% if (tag.tagName === 'link') { %>
    <link rel="stylesheet" href="<%= tag.attributes.href %>" />
    <% } else if (tag.tagName === 'script') { %>
    <script src="<%= tag.attributes.src %>" defer></script>
    <% } %>
    <% } %>
  </head>
  <body class="bg-cax-canvas text-cax-text">
    <div id="app"></div>
  </body>
</html>
